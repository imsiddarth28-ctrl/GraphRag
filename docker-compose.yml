version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./.env:/app/.env
    environment:
      - APP_ENV=development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  neo4j:
    image: neo4j:5.18.0-community
    ports:
      - "7474:7474" # HTTP UI console
      - "7687:7687" # Bolt connection
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.8.0
    ports:
      - "6333:6333" # HTTP REST port
      - "6334:6334" # gRPC port
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:
